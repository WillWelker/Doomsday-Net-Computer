[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; ====================== MONITOR SETTINGS ======================
monitor_speed = 115200
monitor_echo = yes
monitor_filters = time, send_on_enter

; ====================== BUILD SETTINGS ======================
build_flags =
    -O2
    -D CORE_TEENSY
    -D USB_SERIAL
    -D SERIAL1_RX_PIN=0
    -D SERIAL1_TX_PIN=1
    -Wno-error=deprecated-declarations

; ====================== UPLOAD SETTINGS ======================
upload_protocol = teensy-cli
upload_speed = 115200

; ====================== LIBRARIES ======================
lib_deps =
    SPI
    Wire
    SD
    SdFat
    ILI9341_t3
    https://github.com/PaulStoffregen/USBHost_t36.git

; ====================== IMPORTANT: Add this line ======================
lib_extra_dirs = lib

; ====================== NOTES ======================
; USB Host mode handled by USBHost_t36 library
; Main USB port stays in USB_SERIAL for programming + Serial Monitor