[env:RP2040-PiZero]
platform = raspberrypi
board = pico
framework = arduino

; ====================== PROJECT IDENTITY ======================
; Doomsday Ham Radio Comms Computer - RP2040-PiZero Display Node
; 5× UNO R4 Minima modular UART-linked setup
; Core: USB keyboard, SD storage, thermal printer (future), RTTY/CW decode (future), LoRa add-on (future)
; Focus: air-gapped, Cyber Pandemic Immunity, low-power HF/VHF/ISM comms
; Unified firmware with mode byte in flash (RP2040 flash sector) - prior decision referenced

; ====================== MONITOR SETTINGS ======================
monitor_speed = 115200
monitor_echo = yes
monitor_filters = time, send_on_enter

; ====================== BUILD SETTINGS ======================
build_flags =
    -O2
    -D RP2040_PIZERO
    -D DVI_HDMI_OUTPUT
    -D MODE_BYTE_ADDR=0x101FF000  ; Flash location for unified mode byte
    -D DMB_BAUD=921600
    -D DMB_UART_RX=GP0
    -D DMB_UART_TX=GP1
    -D USB_KEYBOARD_SUPPORT
    -D LOW_POWER_MODE
    -I../lib/DoomsdayMessageBus   ; Explicit include path for DMB header

; ====================== UPLOAD SETTINGS ======================
upload_protocol = uf2

; ====================== LIBRARIES ======================
lib_deps =
    SPI
    Wire
    SD
    ; DMB shared library will be added here
    ; PicoDVI / Waveshare DVI driver integration next for HDMI

lib_extra_dirs = ../lib

; ====================== NOTES ======================
; RP2040-PiZero role: Primary HDMI/DVI terminal node (640x480@60Hz)
; Drives retro LVGL UI for CP/M-80 / WordStar / SuperCalc 2 (from project Notes)
; DMB UART link to UNO R4 Minima fleet for MeshCore CLI, RTTY/CW, printer control
; HDMI milestone first: Adapt Waveshare 01-DVI or PicoDVI for this env
; All nodes share unified firmware architecture with mode byte for role selection