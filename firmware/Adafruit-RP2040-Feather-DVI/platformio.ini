; Doomsday Ham Radio Comms Computer - Adafruit RP2040 Feather DVI Node v0.03
; 5× UNO R4 Minima modular UART-linked setup
; Air-gapped, EMP-protected, low-power HF/VHF/ISM comms
; Unified firmware with mode byte in flash (prior decision referenced)
; VERSION: 0.03 - 2026-05-07 - CRITICAL FIX: board = adafruit_feather (not adafruit_feather_rp2040) for maxgerhardt/platform-raspberrypi + earlephilhower core

[env:adafruit-feather-rp2040-dvi]
; ====================== DOOMSDAY PROJECT IDENTITY ======================
; Adafruit RP2040 Feather DVI Node — 5× UNO R4 Minima modular UART-linked setup
; Air-gapped, EMP-protected, low-power HF/VHF/ISM comms
; Unified firmware with mode byte in flash (prior decision referenced)

platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_feather
framework = arduino

; Force earlephilhower arduino-pico core (critical per context.md Section 7)
board_build.core = earlephilhower
platform_packages = 
    earlephilhower/framework-arduinopico

; ====================== FIRMWARE VERSION ======================
; v0.03 - Placeholder (Adafruit RP2040 Feather DVI) — board ID corrected for UnknownBoard resolution

monitor_speed = 115200

build_flags =
    -O2
    -D RP2040_FEATHER_DVI
    -D MODE_BYTE_ADDR=0x101FF000

upload_protocol = uf2

lib_deps =
    SPI
    Wire