[env:adafruit-feather-rp2040-dvi]
platform = raspberrypi
board = adafruit_feather_rp2040
framework = arduino

; ====================== PROJECT IDENTITY ======================
; Doomsday Ham Radio Comms Computer - Adafruit RP2040 Feather DVI Node
; 5× UNO R4 Minima modular UART-linked setup
; Focus: air-gapped, EMP-protected, low-power HF/VHF/ISM comms
; Unified firmware with mode byte in flash - prior decision referenced

; ====================== FIRMWARE VERSION ======================
; v0.01 - Placeholder (Adafruit RP2040 Feather DVI)

monitor_speed = 115200

build_flags =
    -O2
    -D RP2040_FEATHER_DVI
    -D MODE_BYTE_ADDR=0x101FF000

upload_protocol = uf2

lib_deps =
    SPI
    Wire