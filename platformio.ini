[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; ====================== BUILD SETTINGS ======================
build_flags =
    -O2                                      ; Optimize for speed
    -D CORE_TEENSY
    -D USB_SERIAL                            ; For debugging + script upload over USB
    -D USB_HOST                              ; Enable USB Host (keyboard, mouse, hub)
    -D SERIAL1_RX_PIN=0                      ; Our daisy-chain RX
    -D SERIAL1_TX_PIN=1                      ; Our daisy-chain TX
    -Wno-error=deprecated-declarations       ; Suppress common warnings

; ====================== UPLOAD SETTINGS ======================
upload_protocol = teensy-cli
upload_speed = 115200

; ====================== LIBRARY OPTIONS ======================
lib_deps =
    ; Core
    SPI
    Wire
    SD
    SdFat                                    ; Better/faster SD library

    ; USB Host
    https://github.com/PaulStoffregen/USBHost_t36.git

    ; Audio (for MP3, JS8, TTS, etc.)
    https://github.com/PaulStoffregen/Audio.git

    ; LVGL (for future GUI work)
    https://github.com/lvgl/lvgl.git

; ====================== MONITOR SETTINGS ======================
monitor_speed = 115200
monitor_echo = yes
monitor_filters = 
    time
    send_on_enter