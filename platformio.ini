[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; ====================== MONITOR SETTINGS ======================
monitor_speed = 115200
monitor_echo = yes
monitor_filters = time, send_on_enter

; ====================== BUILD SETTINGS ======================
build_flags =
    -O2                                      ; Optimize for speed (good for low-power)
    -D CORE_TEENSY
    -D USB_SERIAL                            ; Normal USB device mode for programming + Serial Monitor
    ; NO -D USB_HOST here — USBHost_t36 library handles host mode separately
    -D SERIAL1_RX_PIN=0                      ; UART1 for future daisy-chain to UNO R4 Minima
    -D SERIAL1_TX_PIN=1
    -Wno-error=deprecated-declarations       ; Suppress common Teensy warnings

; ====================== UPLOAD SETTINGS ======================
upload_protocol = teensy-cli
upload_speed = 115200

; ====================== LIBRARIES ======================
lib_deps =
    ; Core Teensy libraries
    SPI
    Wire
    SD
    SdFat                                    ; Better SD performance than basic SD lib
    ILI9341_t3
    
    ; USB Host for keyboard (soldered port)
    https://github.com/PaulStoffregen/USBHost_t36.git
    
    ; Future features
    ; https://github.com/PaulStoffregen/Audio.git      ; for RTTY/CW decode, TTS, etc.
    ; https://github.com/lvgl/lvgl.git                 ; for future LVGL graphics on display

; ====================== NOTES ======================
; USB Host mode does NOT require -D USB_HOST or changing USB type.
; The main USB port stays in USB_SERIAL for programming + terminal.
; The soldered USB host port is handled entirely by USBHost_t36 library.