[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; ====================== MONITOR SETTINGS ======================
monitor_speed = 115200
monitor_echo = yes
monitor_filters = time, send_on_enter

; ====================== BUILD SETTINGS ======================
build_flags =
    -O2                                      ; Optimize for speed (good for low-power)
    -D CORE_TEENSY
    -D USB_SERIAL                            ; Normal USB device mode for programming + Serial Monitor
    ; NO -D USB_HOST here — USBHost_t36 library handles host mode separately
    -D SERIAL1_RX_PIN=0                      ; UART1 for future daisy-chain to UNO R4 Minima
    -D SERIAL1_TX_PIN=1
    -Wno-error=deprecated-declarations       ; Suppress common Teensy warnings

; ====================== UPLOAD SETTINGS ======================
upload_protocol = teensy-cli
upload_speed = 115200

; ====================== LIBRARIES ======================
lib_deps =
    ; Core Teensy libraries
    SPI
    Wire
    SD
    SdFat                                    ; Better SD performance than basic SD lib
    ILI9341_t3
    
    ; USB Host for keyboard (soldered port)
    https://github.com/PaulStoffregen/USBHost_t36.git
    
    ; Future features
    ; https://github.com/PaulStoffregen/Audio.git      ; for RTTY/CW decode, TTS, etc.
    ; https://github.com/lvgl/lvgl.git                 ; for future LVGL graphics on display

; ====================== NOTES ======================
; USB Host mode does NOT require -D USB_HOST or changing USB type.
; The main USB port stays in USB_SERIAL for programming + terminal.
; The soldered USB host port is handled entirely by USBHost_t36 library.


; ============================================================
; RP2040-PIZERO MODULE (Display + Keyboard Co-Processor)
; ============================================================
[env:rp2040_pizero]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino

; ====================== MONITOR SETTINGS ======================
monitor_speed = 115200
monitor_echo = yes
monitor_filters = time, send_on_enter

; ====================== BUILD SETTINGS ======================
build_flags =
    -O2
    -D ARDUINO_ARCH_RP2040
    ; Add RP2040-specific defines as needed (e.g. for DVI resolution)
    ; -D DVI_RESOLUTION=640x480

; ====================== UPLOAD SETTINGS ======================
; RP2040 boards use BOOTSEL mode or picotool
upload_protocol = picotool

; ====================== LIBRARIES ======================
lib_deps =
    ; Core RP2040 libs
    SPI
    Wire
    ; SD (uncomment if needed on this module)
    ; SD

    ; HDMI/DVI output library (uncomment the one you are using)
    ; https://github.com/cpldcpu/PicoDVI.git
    ; or your current DVI library for 640x480 output

    ; Future USB Host keyboard support (more complex on RP2040)
    ; https://github.com/adafruit/Adafruit_TinyUSB_Arduino.git

; ====================== NOTES ======================
; This environment is for the Waveshare RP2040-PiZero (or compatible)
; display + keyboard module. It receives UART commands from the
; Teensy 4.1 main hub using the Doomsday Message Bus (DMB).
; HDMI output is handled via RP2040 PIO.
; See docs/modules/rp2040-display-keyboard.md for details.
; No Teensy-specific code or libraries should be used here.
; Pin definitions are completely different from the Teensy version.